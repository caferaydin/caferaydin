title: Cafer Aydın
email: zng.caferaydin@gmail.com
description: >-
  Cafer Aydın — Senior Software Developer. Java & .NET backend,
  distributed systems, microservice architectures and ERP/CRM integrations.
url: "https://caferaydin.github.io"
baseurl: ""
lang: tr
timezone: Europe/Istanbul
markdown: kramdown
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Cafer_Aydin.pdf
  - README.md
  - Gemfile
  - Gemfile.lock

collections:
  notes:
    output: true
    permalink: /notes/:path/
  notes_en:
    output: true
    permalink: /en/notes/:path/

defaults:
  - scope:
      path: ""
    values:
      layout: default
      image: /assets/images/og-default.jpg
  - scope:
      path: ""
      type: notes
    values:
      layout: note
      lang: tr
  - scope:
      path: ""
      type: notes_en
    values:
      layout: note
      lang: en
