- slug: nationality-verification
  name: Nationality Verification Service
  client: Colendi
  stack: Spring Boot 3 / Java 17
  status_tr: Production
  status_en: Production
  role_tr: Freelance Backend Developer
  role_en: Freelance Backend Developer
  link: https://github.com/caferaydin/NationalityVerification
  link_label: github.com/caferaydin/NationalityVerification
  summary_tr: >-
    Colendi fintech ekosistemi için geliştirilen, kimlik doğrulama ve belge
    yükleme akışlarını yöneten REST servis. KVKK uyumlu güvenlik katmanı,
    correlation ID tabanlı izlenebilirlik ve production-ready monitoring
    üzerine kurulu.
  summary_en: >-
    A REST service built for the Colendi fintech ecosystem that orchestrates
    identity verification and document upload flows. Designed around a KVKK
    compliant security layer, correlation-ID observability, and
    production-ready monitoring.
  bullets_tr:
    - "Spring Boot 3.x ve Java 17 ile clean architecture yaklaşımında katmanlı mimari (api / application / infrastructure / common) geliştirdim."
    - "TCKN masking, HMAC bazlı hash ve raw veri loglanmasını engelleyen KVKK uyumlu güvenlik katmanı tasarladım."
    - "Correlation ID tabanlı MDC logging, global exception handling ve standart hata zarfı ile cross-cutting altyapı oluşturdum."
    - "Multipart file upload (boyut/MIME validation), UUID tabanlı depolama, webhook ve QR endpoint entegrasyonlarını hayata geçirdim."
    - "Spring Boot Actuator ile health check ve production-ready monitoring konfigürasyonunu uyguladım."
  bullets_en:
    - "Layered clean architecture (api / application / infrastructure / common) built on Spring Boot 3.x and Java 17."
    - "KVKK compliant security layer with TCKN masking, HMAC hashing, and strict prevention of raw-data logging."
    - "Cross-cutting infrastructure with correlation-ID MDC logging, global exception handling, and standardized error envelopes."
    - "Multipart file upload with size/MIME validation, UUID-based storage, webhook callbacks, and QR endpoint integrations."
    - "Production-ready monitoring via Spring Boot Actuator health checks and observability configuration."
  tags: ["Spring Boot 3", "Java 17", "Clean Architecture", "REST", "KVKK", "MDC Logging", "Actuator"]

